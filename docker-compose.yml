services:
  app:
    build: .
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      DATABASE_URL: ${DATABASE_URL:-postgresql://steady:steady@postgres:5432/steady_current}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-5}
      GRADIO_SERVER_NAME: ${GRADIO_SERVER_NAME:-0.0.0.0}
      GRADIO_SERVER_PORT: ${GRADIO_SERVER_PORT:-7870}
      APP_USER_ID: ${APP_USER_ID:-default-user}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:7870:7870"
    command: uv run python -m app.main

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: steady
      POSTGRES_PASSWORD: steady
      POSTGRES_DB: steady_current
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steady -d steady_current"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
